<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Fan Game - +Z Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }

        /* Интерфейс часов */
        #ui {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #ffffff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.5), 3px 3px #000;
            pointer-events: none;
            z-index: 10;
        }

        /* Зоны клика */
        #click-flashlight {
            position: absolute;
            top: 20%; left: 25%; width: 50%; height: 50%;
            cursor: crosshair;
            z-index: 5;
        }
        
        #click-door {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 25%;
            cursor: pointer;
            background: linear-gradient(transparent, rgba(255, 0, 0, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 6;
        }
        #click-door:hover { opacity: 1; }

        /* Финальное видео */
        #end-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            object-fit: cover;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ui">12:00 AM</div>
    <div id="click-flashlight"></div>
    <div id="click-door">ЗАКРЫТЬ ДВЕРЬ</div>
    <video id="end-video" playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Константы и Состояние ---
        let state = 'static'; // static -> ready -> attack
        let gameActive = true;
        let timeInSeconds = 0;
        let enemyTimer = Math.random() * 10 + 7; 
        const GAME_DURATION = 360; // 6 минут

        // --- Сцена ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Позиция игрока и направление взгляда в +Z
        camera.position.set(0, 1.6, 0);
        camera.lookAt(0, 1.6, 10); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.02); // Почти полная тьма
        scene.add(ambientLight);

        // Фонарик (SpotLight)
        const flashlight = new THREE.SpotLight(0xffffff, 0); 
        flashlight.position.set(0, 1.6, 0);
        flashlight.angle = Math.PI / 7;
        flashlight.penumbra = 0.4;
        flashlight.decay = 2;
        flashlight.distance = 15;
        flashlight.castShadow = true;

        // Цель фонарика (куда он светит)
        const lightTarget = new THREE.Object3D();
        lightTarget.position.set(0, 1.6, 10); // Светит в сторону +Z
        scene.add(lightTarget);
        flashlight.target = lightTarget;
        scene.add(flashlight);

        // --- Загрузка моделей ---
        const loader = new GLTFLoader();
        let enemyModel;

        loader.load('location.glb', (gltf) => {
            scene.add(gltf.scene);
        }, undefined, (e) => console.error("Ошибка загрузки локации:", e));

        loader.load('enemy.glb', (gltf) => {
            enemyModel = gltf.scene;
            enemyModel.position.set(0, 0.5, 2); // Начальная позиция (далеко)
            scene.add(enemyModel);
        }, undefined, (e) => console.error("Ошибка загрузки врага:", e));

        // --- Механики и Интерфейс ---
        const ui = document.getElementById('ui');
        const video = document.getElementById('end-video');

        // Включение фонарика
        document.getElementById('click-flashlight').addEventListener('mousedown', () => {
            if (gameActive) flashlight.intensity = 15;
        });
        document.getElementById('click-flashlight').addEventListener('mouseup', () => {
            flashlight.intensity = 0;
        });

        // Дверь
        document.getElementById('click-door').addEventListener('mousedown', () => {
            if (gameActive && state === 'ready') {
                resetEnemy();
            }
        });

        function resetEnemy() {
            state = 'static';
            enemyTimer = Math.random() * 15 + 10;
            if (enemyModel) enemyModel.position.set(0, 0.5, 2);
            console.log("Враг отступил");
        }

        function gameOver(isWin) {
            gameActive = false;
            flashlight.intensity = 0;
            video.src = isWin ? 'win.mp4' : 'scare.mp4';
            video.style.display = 'block';
            video.play();
        }

        // --- Основной цикл обновления ---
        const clock = new THREE.Clock();

        function updateLogic() {
            if (!gameActive) return;

            const delta = clock.getDelta();
            timeInSeconds += delta;

            // 1. Обновление цифровых часов (1 сек реального времени = 1 мин игрового)
            let totalMins = Math.floor(timeInSeconds);
            let displayHours = 12 + Math.floor(totalMins / 60);
            if (displayHours > 12) displayHours -= 12;
            let displayMins = totalMins % 60;
            ui.innerText = `${displayHours}:${displayMins < 10 ? '0' + displayMins : displayMins} AM`;

            // 2. Проверка на победу (6 минут)
            if (timeInSeconds >= GAME_DURATION) {
                gameOver(true);
            }

            // 3. ИИ противника
            enemyTimer -= delta;
            if (enemyTimer <= 0) {
                if (state === 'static') {
                    state = 'ready';
                    enemyTimer = 20; // 20 секунд до скримера
                    if (enemyModel) enemyModel.position.set(0, 0.5, 1); // Подошел ближе
                    console.log("Враг у двери!");
                } else if (state === 'ready') {
                    state = 'attack';
                    gameOver(false);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updateLogic();
            renderer.render(scene, camera);
        }

        // Ресайз окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
