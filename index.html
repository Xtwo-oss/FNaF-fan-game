<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Web Fan-Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }

        /* Интерфейс */
        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 32px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }

        /* Зоны клика */
        #click-flashlight {
            position: absolute;
            top: 20%; left: 25%; width: 50%; height: 50%;
            cursor: pointer;
            background: rgba(0, 0, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #click-flashlight:hover { opacity: 1; }
        #click-door {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            cursor: pointer;
            background: rgba(255, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #click-door:hover { opacity: 1; }

        /* Видео финала */
        #end-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            object-fit: cover;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ui">12:00 AM</div>
    <div id="click-flashlight"></div>
    <div id="click-door">ЗАКРЫТЬ ДВЕРЬ</div>
    <video id="end-video" playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Настройки ---
        let state = 'static'; // static, ready, attack
        let gameActive = true;
        let timeInSeconds = 0;
        let enemyTimer = Math.random() * 10 + 5; // Случайное время для первого шага
        const GAME_DURATION = 360; // 6 минут

        // --- Сцена ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.set(1, 1.6, 0.1); // Высота глаз человека, смещённая по X и Z
camera.rotation.x = Math.PI;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.1); // Почти полная темнота
        scene.add(ambientLight);

        const flashlight = new THREE.SpotLight(0xffffff, 0); // Фонарик (выключен)
        flashlight.position.set(0, 1.6, 0);
        flashlight.angle = Math.PI / 6;
        flashlight.penumbra = 0.3;
        flashlight.castShadow = true;
        scene.add(flashlight);
        scene.add(flashlight.target);

        // --- Загрузка моделей ---
        const loader = new GLTFLoader();
        let enemyModel;

        loader.load('location.glb', (gltf) => {
            scene.add(gltf.scene);
        });

        loader.load('enemy.glb', (gltf) => {
            enemyModel = gltf.scene;
            enemyModel.position.set(0, 0.5, 2);
            scene.add(enemyModel);
        });

        // --- Механики ---
        const ui = document.getElementById('ui');
        const video = document.getElementById('end-video');

        // Фонарик
        document.getElementById('click-flashlight').addEventListener('mousedown', () => {
            if (gameActive) flashlight.intensity = 10;
        });
        document.getElementById('click-flashlight').addEventListener('mouseup', () => {
            flashlight.intensity = 0;
        });

        // Дверь
        document.getElementById('click-door').addEventListener('click', () => {
            if (state === 'ready') {
                resetEnemy();
            }
        });

        function resetEnemy() {
            state = 'static';
            enemyTimer = Math.random() * 15 + 10;
            if (enemyModel) enemyModel.position.set(0, 0.5, 2);
        }

        function gameOver(win) {
            gameActive = false;
            video.src = win ? 'win.mp4' : 'scare.mp4';
            video.style.display = 'block';
            video.play();
        }

        // --- Игровой цикл ---
        const clock = new THREE.Clock();

        function updateGame() {
            const delta = clock.getDelta();
            if (!gameActive) return;

            timeInSeconds += delta;

            // Обновление часов
            let totalMinutes = Math.floor(timeInSeconds);
            let displayHours = 12 + Math.floor(totalMinutes / 60);
            if (displayHours > 12) displayHours -= 12;
            let displayMins = totalMinutes % 60;
            ui.innerText = `${displayHours}:${displayMins < 10 ? '0' + displayMins : displayMins} AM`;

            // Таймер победы
            if (timeInSeconds >= GAME_DURATION) {
                gameOver(true);
            }

            // Логика противника
            enemyTimer -= delta;
            if (enemyTimer <= 0) {
                if (state === 'static') {
                    state = 'ready';
                    enemyTimer = 20; // 20 секунд до атаки
                    if (enemyModel) enemyModel.position.set(0, 0.5, 1);
                } else if (state === 'ready') {
                    state = 'attack';
                    if (enemyModel) scene.remove(enemyModel);
                    gameOver(false);
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updateGame();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
