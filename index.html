<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Web Fan-Game с джойстиками</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }

        #ui {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 32px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }

        #click-flashlight {
            position: absolute;
            top: 20%; left: 25%; width: 50%; height: 50%;
            cursor: pointer;
        }
        #click-door {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            cursor: pointer;
            background: rgba(255, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #click-door:hover { opacity: 1; }

        #end-video {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            object-fit: cover;
            z-index: 100;
        }

        /* Джойстики */
        #joystick-move, #joystick-look {
            position: absolute;
            bottom: 20px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            touch-action: none;
        }
        #joystick-move { left: 10%; }
        #joystick-look { right: 10%; }

        /* Панель координат */
        #debug-info {
            position: absolute;
            top: 10px; left: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 16px;
            white-space: pre;
        }
    </style>
</head>
<body>

    <div id="ui">12:00 AM</div>
    <div id="click-flashlight"></div>
    <div id="click-door">ЗАКРЫТЬ ДВЕРЬ</div>
    <video id="end-video" playsinline></video>

    <!-- Джойстики -->
    <div id="joystick-move"></div>
    <div id="joystick-look"></div>

    <!-- Инфо-панель -->
    <div id="debug-info"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let state = 'static';
        let gameActive = true;
        let timeInSeconds = 0;
        let enemyTimer = Math.random() * 10 + 5;
        const GAME_DURATION = 360;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(1, 1.6, 0.1);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.1);
        scene.add(ambientLight);

        const flashlight = new THREE.SpotLight(0xffffff, 0);
        flashlight.position.set(0, 1.6, 0);
        flashlight.angle = Math.PI / 6;
        flashlight.penumbra = 0.3;
        flashlight.castShadow = true;
        scene.add(flashlight);
        scene.add(flashlight.target);

        const loader = new GLTFLoader();
        let enemyModel;

        loader.load('location.glb', (gltf) => {
            scene.add(gltf.scene);
        });

        loader.load('enemy.glb', (gltf) => {
            enemyModel = gltf.scene;
            enemyModel.position.set(0, 0.5, 2);
            scene.add(enemyModel);
        });

        const ui = document.getElementById('ui');
        const video = document.getElementById('end-video');

        document.getElementById('click-flashlight').addEventListener('mousedown', () => {
            if (gameActive) flashlight.intensity = 10;
        });
        document.getElementById('click-flashlight').addEventListener('mouseup', () => {
            flashlight.intensity = 0;
        });

        document.getElementById('click-door').addEventListener('click', () => {
            if (state === 'ready') {
                resetEnemy();
            }
        });

        function resetEnemy() {
            state = 'static';
            enemyTimer = Math.random() * 15 + 10;
            if (enemyModel) enemyModel.position.set(0, 0.5, 2);
        }

        function gameOver(win) {
            gameActive = false;
            video.src = win ? 'win.mp4' : 'scare.mp4';
            video.style.display = 'block';
            video.play();
        }

        const clock = new THREE.Clock();

        function updateGame() {
            const delta = clock.getDelta();
            if (!gameActive) return;

            timeInSeconds += delta;
            let totalMinutes = Math.floor(timeInSeconds);
            let displayHours = 12 + Math.floor(totalMinutes / 60);
            if (displayHours > 12) displayHours -= 12;
            let displayMins = totalMinutes % 60;
            ui.innerText = `${displayHours}:${displayMins < 10 ? '0' + displayMins : displayMins} AM`;

            if (timeInSeconds >= GAME_DURATION) {
                gameOver(true);
            }

            enemyTimer -= delta;
            if (enemyTimer <= 0) {
                if (state === 'static') {
                    state = 'ready';
                    enemyTimer = 20;
                    if (enemyModel) enemyModel.position.set(0, 0.5, 1);
                } else if (state === 'ready') {
                    state = 'attack';
                    if (enemyModel) scene.remove(enemyModel);
                    gameOver(false);
                }
            }
        }

        // --- Джойстики ---
        const moveJoystick = nipplejs.create({
            zone: document.getElementById('joystick-move'),
            mode: 'dynamic',
            color: 'white'
        });
        const lookJoystick = nipplejs.create({
            zone: document.getElementById('joystick-look'),
            mode: 'dynamic',
            color: 'red'
        });

        let moveSpeed = 0.05;
        let lookSpeed = 0.02;

        moveJoystick.on('move', (evt, data) => {
            if (data.direction) {
                const angle = data.angle.radian;
                // движение относительно направления камеры
                camera.position.x += Math.cos(angle) * moveSpeed;
                camera.position.z += Math.sin(angle) * moveSpeed;
            }
        });

        lookJoystick.on('move', (evt, data) => {
            camera.rotation.y -= data.vector.x * lookSpeed;
            camera.rotation.x -= data.vector.y * lookSpeed;
        });

        function updateDebug() {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            document.getElementById('debug-info').innerText =
                `Pos: x=${camera.position.x.toFixed(2)}, y=${camera.position.y.toFixed(2)}, z=${camera.position.z.toFixed(2)}\n` +
                `Look: x=${dir.x.toFixed(2)}, y=${dir.y.toFixed(2)}, z=${dir.z.toFixed(2)}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            updateGame();
            updateDebug();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
