<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Web Game - Minus Z Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; }

        #ui {
            position: absolute;
            top: 20px; right: 20px;
            color: #fff; font-size: 32px; font-weight: bold;
            text-shadow: 2px 2px #000; z-index: 10;
        }

        #click-flashlight {
            position: absolute;
            top: 20%; left: 20%; width: 60%; height: 50%;
            z-index: 5; cursor: crosshair;
        }

        #click-door {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(transparent, rgba(255, 0, 0, 0.15));
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 20; font-size: 20px; opacity: 0; transition: 0.3s;
        }
        #click-door:hover { opacity: 1; }

        #end-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; object-fit: cover; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="ui">12:00 AM</div>
    <div id="click-flashlight"></div>
    <div id="click-door">ЗАКРЫТЬ ДВЕРЬ</div>
    <video id="end-video" playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Состояние игры ---
        let state = 'static';
        let gameActive = true;
        let timeInSeconds = 0;
        let enemyTimer = Math.random() * 10 + 7;
        const GAME_DURATION = 360;

        // --- Сцена ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // ПОЗИЦИЯ ИГРОКА: X = 1, Z = 0.1
        camera.position.set(1, 1.6, 0.1);
        
        // ВЗГЛЯД: В сторону ОТРИЦАТЕЛЬНОЙ оси Z (вперед в темноту)
        camera.lookAt(1, 1.6, -10); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.01);
        scene.add(ambientLight);

        // Фонарик (SpotLight)
        const flashlight = new THREE.SpotLight(0xffffff, 0);
        flashlight.position.copy(camera.position);
        flashlight.angle = Math.PI / 7;
        flashlight.penumbra = 0.3;
        
        const lightTarget = new THREE.Object3D();
        // Цель света тоже в отрицательной зоне Z
        lightTarget.position.set(1, 1.6, -10); 
        scene.add(lightTarget);
        flashlight.target = lightTarget;
        scene.add(flashlight);

        // --- Загрузка моделей ---
        const loader = new GLTFLoader();
        let enemyModel;
        
        loader.load('location.glb', (gltf) => scene.add(gltf.scene));
        
        loader.load('enemy.glb', (gltf) => {
            enemyModel = gltf.scene;
            // Враг на X=1, позиция Static: Z = -2
            enemyModel.position.set(1, 0.5, -2); 
            scene.add(enemyModel);
        });

        // --- Управление ---
        document.getElementById('click-flashlight').addEventListener('mousedown', () => { 
            if(gameActive) flashlight.intensity = 15; 
        });
        document.getElementById('click-flashlight').addEventListener('mouseup', () => {
            flashlight.intensity = 0; 
        });

        document.getElementById('click-door').addEventListener('mousedown', () => {
            if (gameActive && state === 'ready') {
                state = 'static';
                enemyTimer = Math.random() * 12 + 8;
                // Возвращаем врага на исходную Z = -2
                if (enemyModel) enemyModel.position.set(1, 0.5, -2);
            }
        });

        function gameOver(win) {
            gameActive = false;
            flashlight.intensity = 0;
            const v = document.getElementById('end-video');
            v.src = win ? 'win.mp4' : 'scare.mp4';
            v.style.display = 'block';
            v.play();
        }

        // --- Игровой цикл ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return;

            const delta = clock.getDelta();
            timeInSeconds += delta;

            // Часы
            let totalMins = Math.floor(timeInSeconds);
            let h = 12 + Math.floor(totalMins / 60);
            if (h > 12) h -= 12;
            document.getElementById('ui').innerText = `${h}:${(totalMins % 60).toString().padStart(2, '0')} AM`;

            if (timeInSeconds >= GAME_DURATION) gameOver(true);

            // ИИ Врага (движение по отрицательной оси Z)
            enemyTimer -= delta;
            if (enemyTimer <= 0) {
                if (state === 'static') {
                    state = 'ready'; 
                    enemyTimer = 20;
                    // Состояние Ready: враг подошел ближе (Z = -1)
                    if (enemyModel) enemyModel.position.set(1, 0.5, -1);
                } else if (state === 'ready') {
                    state = 'attack'; 
                    gameOver(false);
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
